<!DOCTYPE html>
<html lang="en" class="overflow-hidden m-0 p-0">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="assets/images/icon.ico">
    <title>Starbits</title>

    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script src="./assets/js/tailwind/tailwind-3.4.17.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'h-sm': { 'raw': '(min-height: 400px)' },
                        'h-md': { 'raw': '(min-height: 600px)' },
                        'h-lg': { 'raw': '(min-height: 800px)' },
                        'h-xl': { 'raw': '(min-height: 1000px)' },
                        'h-2xl': { 'raw': '(min-height: 1200px)' },
                        'h-3xl': { 'raw': '(min-height: 1400px)' },
                        'mobile-portrait': { 'raw': '(orientation: portrait) and (pointer: coarse)' },
                    },
                    animation: {
                        'rotate-device': 'rotate-device 1.5s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        'rotate-device': {
                            '0%': { transform: 'rotate(0deg)' },
                            '100%': { transform: 'rotate(90deg)' },
                        },
                    },
                }
            }
        }
    </script>

    <script src="./assets/js/nipplejs/nipplejs-1.0.1.umd.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/lullaby6/canvas-engine.js/src/libs/matter/matter.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/lullaby6/canvas-engine.js/src/canvas-engine.js"></script>

    <script src="./canvas-engine.js/src/libs/matter/matter.min.js"></script>
    <script type="module" src="./canvas-engine.js/src/canvas-engine.js"></script>

    <script type="module" src="./src/game.js"></script>

    <style>
        @font-face {
            font-family: wendy;
            src: url("./assets/fonts/wendy.ttf") format("truetype");
        }

        * {
            font-family: wendy;
            user-select: none;
            touch-action: none;
            -webkit-user-select: none;
        }
    </style>

    <style type="text/tailwindcss">
        @layer components {
            .flex-center {
                @apply flex justify-center items-center;
            }

            .menu {
                @apply text-3xl h-md:text-6xl absolute top-0 left-0 w-full h-full z-50 flex justify-center items-center;
            }

            .menu-btns {
                @apply flex flex-col gap-2 justify-center items-center;
            }

            .btn {
                @apply w-full border border-2 border-neutral-300 text-neutral-300 hover:opacity-50 px-10 py-0.5 cursor-pointer;
            }

            .overlay {
                @apply absolute top-0 left-0 w-full h-full;
            }
        }
    </style>
</head>

<body class="m-0 p-0 bg-black text-neutral-300">
    <main id="game" class="relative w-screen h-screen">
        <div data-canvas-game-container id="canvas-container" class="w-full h-full relative">
            <div data-canvas-game-gui="version" data-canvas-game-display="flex" id="gui_version"
                class="overlay pointer-events-none hidden">
                <span class="absolute bottom-0 left-2 text-lg h-md:text-xl">v0.0.7</span>
            </div>


            <div data-canvas-game-menu="start" data-canvas-game-display="flex" id="menu_start" class="menu hidden">
                <div class="menu-btns">
                    <h1 class="text-6xl h-md:text-9xl">Starbits</h1>
                    <button class="btn" data-action="changeScene" data-scene="game">Start</button>
                    <button class="btn" data-action="navigate" data-target="options" data-from="start">Options</button>
                    <button class="btn" data-action="quit">Quit</button>
                </div>
            </div>

            <div data-canvas-game-menu="pauseOverlay" data-canvas-game-display="flex" id="menu_pause_overlay"
                class="menu bg-black bg-opacity-50 hidden"></div>

            <div data-canvas-game-menu="pause" data-canvas-game-display="flex" id="menu_pause" class="menu hidden">
                <div class="menu-btns">
                    <button class="btn" data-action="resume">Resume</button>
                    <button class="btn" data-action="resetScene">Restart</button>
                    <button class="btn" data-action="navigate" data-target="options" data-from="pause">Options</button>
                    <button class="btn" data-action="changeScene" data-scene="start">Exit</button>
                </div>
            </div>

            <div data-canvas-game-menu="options" data-canvas-game-display="flex" id="menu_options" class="menu hidden">
                <div class="menu-btns">
                    <button class="btn" data-action="toggleFullscreen">Fullscreen: <span
                            data-option-value="fullscreen">OFF</span></button>
                    <button class="btn" data-action="toggleOption" data-option="autoAim">Auto Aim: <span
                            data-option-value="autoAim"></span></button>
                    <button class="btn" data-action="toggleOption" data-option="dangerVignette">Danger Vignette: <span
                            data-option-value="dangerVignette"></span></button>
                    <button class="btn" data-action="toggleOption" data-option="bloom">Bloom: <span
                            data-option-value="bloom"></span></button>
                    <button class="btn" data-action="toggleOption" data-option="particles">Particles: <span
                            data-option-value="particles"></span></button>
                    <button class="btn" data-action="back">Back</button>
                </div>
            </div>

            <div data-canvas-game-menu="upgrade" data-canvas-game-display="flex" id="menu_upgrade" class="menu hidden">
                <div class="menu-btns">
                    <h2 class="text-4xl h-md:text-7xl mb-2">Upgrade</h2>
                    <button class="btn" data-action="selectUpgrade" data-upgrade-slot="0" id="upgrade_btn_0"></button>
                    <button class="btn" data-action="selectUpgrade" data-upgrade-slot="1" id="upgrade_btn_1"></button>
                    <button class="btn" data-action="selectUpgrade" data-upgrade-slot="2" id="upgrade_btn_2"></button>
                </div>
            </div>

            <div data-canvas-game-menu="restart" data-canvas-game-display="flex" id="menu_restart" class="menu hidden">
                <div class="menu-btns">
                    <button class="btn" data-action="resetScene">Retry</button>
                    <button class="btn" data-action="navigate" data-target="options"
                        data-from="restart">Options</button>
                    <button class="btn" data-action="changeScene" data-scene="start">Exit</button>
                </div>
            </div>

            <div data-canvas-game-gui="game_score" data-canvas-game-display="flex" id="gui_game_score"
                class="overlay flex flex-col justify-start items-center pointer-events-none hidden">
                <span id="gui_game_score_score" class="text-3xl h-md:text-6xl">0</span>
                <span class="text-lg h-md:text-2xl relative bottom-3">BEST: <span
                        id="gui_game_score_best">0</span></span>
            </div>

            <div data-canvas-game-gui="mobile" data-canvas-game-display="flex" id="gui_mobile"
                class="overlay flex flex-col justify-start items-center pointer-events-none hidden">
                <button data-action="pause" class="absolute top-0 left-0 m-4 text-xl h-sm:hidden pointer-events-auto">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 1200 1200">
                        <path fill="currentColor" d="M0 0h500v1200H0zm700 0h500v1200H700z" />
                    </svg>
                </button>
            </div>

            <div data-canvas-game-gui="joystick-left" id="joystick-left"
                class="absolute left-0 bottom-0 w-[25%] h-[50%] z-50 opacity-25 hidden"></div>
            <div data-canvas-game-gui="joystick-right" id="joystick-right"
                class="absolute right-0 bottom-0 w-[25%] h-[50%] z-50 opacity-25 hidden"></div>

            <canvas id="canvas" class="w-full h-full block object-contain"></canvas>

            <div data-canvas-game-gui="danger_vignette" data-canvas-game-display="block" id="gui_danger_vignette"
                class="overlay pointer-events-none z-40"
                style="opacity: 0; transition: opacity 120ms linear; will-change: opacity;">
            </div>
        </div>
    </main>

    <div id="rotate-screen"
        class="fixed inset-0 bg-black z-[9999] flex-center flex-col gap-4 text-2xl hidden mobile-portrait:!flex">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"
                class="origin-center animate-rotate-device" />
        </svg>
        <span class="text-center">Rotate your device</span>
    </div>
</body>

</html>
