<!DOCTYPE html>
<html lang="en" class="overflow-hidden m-0 p-0">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="assets/images/icon.ico">
    <title>Starbits</title>

    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    <script src="./assets/js/tailwind/tailwind-3.4.17.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'h-sm': { 'raw': '(min-height: 400px)' },
                        'h-md': { 'raw': '(min-height: 600px)' },
                        'h-lg': { 'raw': '(min-height: 800px)' },
                        'h-xl': { 'raw': '(min-height: 1000px)' },
                    }
                }
            }
        }
    </script>

    <script src="./assets/js/nipplejs/nipplejs-1.0.1.umd.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/lullaby6/canvas-engine.js/src/libs/matter/matter.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/lullaby6/canvas-engine.js/src/canvas-engine.js"></script>

    <script src="./canvas-engine.js/src/libs/matter/matter.min.js"></script>
    <script type="module" src="./canvas-engine.js/src/canvas-engine.js"></script>

    <script type="module" src="./src/game.js"></script>

    <style>
        @font-face {
            font-family: wendy;
            src: url("./assets/fonts/wendy.ttf") format("truetype");
        }

        * {
            font-family: wendy;
        }
    </style>

    <style type="text/tailwindcss">
        @layer components {
            .flex-center {
                @apply flex justify-center items-center;
            }

            .menu {
                @apply text-3xl h-md:text-6xl absolute top-0 left-0 w-full h-full z-50 flex justify-center items-center;
            }

            .btn {
                @apply border border-2 border-neutral-300 text-neutral-300 hover:opacity-50 px-10 py-0.5 cursor-pointer;
            }
        }
    </style>
</head>

<body class="m-0 p-0 bg-black">
    <main id="game" class="relative w-screen h-screen">
        <div data-canvas-game-container id="canvas-container" class="w-full h-full relative">
            <div data-canvas-game-menu="start" data-canvas-game-display="flex" id="menu_start" class="menu hidden">
                <button id="menu_start_start" class="btn">Start</button>
                <button id="menu_start_options" class="btn">Options</button>
                <button id="menu_start_quit" class="btn">Quit</button>
            </div>

            <div data-canvas-game-menu="pause" data-canvas-game-display="flex" id="menu_pause"
                class="menu bg-black bg-opacity-50 hidden">
                <div class="flex flex-col gap-2">
                    <button id="menu_pause_resume" class="btn">Resume</button>
                    <button id="menu_pause_restart" class="btn">Restart</button>
                    <button id="menu_pause_options" class="btn">Options</button>
                    <button id="menu_pause_quit" class="btn">Quit</button>
                </div>
            </div>

            <div data-canvas-game-menu="options" data-canvas-game-display="flex" id="menu_options"
                class="menu bg-black bg-opacity-50 hidden">
                <div class="flex flex-col gap-2">
                    <button id="menu_options_fullscreen" class="btn">Fullscreen: <span
                            id="menu_options_fullscreen_value">OFF</span></button>
                    <button id="menu_options_back" class="btn">Back</button>
                </div>
            </div>

            <div data-canvas-game-loading="game" id="loading hidden"
                class="absolute top-0 left-0 w-full h-full bg-black z-100 transition-opacity">
            </div>

            <div data-canvas-game-gui="game" data-canvas-game-display="flex" id="gui_game hidden"
                class="text-white absolute top-0 left-0 w-full h-full flex flex-col justify-start items-center pointer-events-none">
                <span id="gui_game_score" class="text-3xl h-md:text-6xl">0</span>
                <span class="text-2xl h-md:text-4xl">BEST: <span id="gui_game_best">0</span></span>

                <button id="gui_game_pause" class="absolute top-0 left-0 m-4 text-xl h-md:hidden pointer-events-auto">
                    <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 1200 1200">
                        <path fill="currentColor" d="M0 0h500v1200H0zm700 0h500v1200H700z" />
                    </svg>
                </button>
            </div>

            <div data-canvas-game-gui="joystick-left" id="joystick-left hidden"
                class="absolute left-0 bottom-0 w-[25%] h-[50%] z-50 opacity-25"></div>
            <div data-canvas-game-gui="joystick-right" id="joystick-right hidden"
                class="absolute right-0 bottom-0 w-[25%] h-[50%] z-50 opacity-25"></div>

            <canvas id="canvas" class="w-full h-full block object-contain"></canvas>
        </div>
    </main>
</body>

</html>
